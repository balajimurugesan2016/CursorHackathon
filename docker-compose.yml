services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    environment:
      - PORT=8080
      - API_BACKEND_URL=http://enterpriseservice:8085

  enterpriseservice:
    build:
      context: ./enterpriseservice
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - MOCK_SERVICES_BASE_URL=http://host.docker.internal:8082
