services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    environment:
      - PORT=8080
      - API_BACKEND_URL=http://enterpriseservice:8085

  location-service:
    build:
      context: ./agents/location-service
      dockerfile: Dockerfile
    ports:
      - "8095:8095"
    depends_on:
      - mockservices
      - enterpriseservice
    environment:
      - ENTERPRISE_SERVICE_URL=http://enterpriseservice:8085
      - MOCK_SERVICES_URL=http://mockservices:8082

  ship-mobility-service:
    build:
      context: ./agents/ship-mobility-service
      dockerfile: Dockerfile
    ports:
      - "8096:8096"
    depends_on:
      - mockservices
      - enterpriseservice
    environment:
      - ENTERPRISE_SERVICE_URL=http://enterpriseservice:8085
      - MOCK_SERVICES_URL=http://mockservices:8082

  news-agent:
    build:
      context: ./agents/news-agent
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    depends_on:
      - mockservices
      - location-service
      - enterpriseservice
    environment:
      - MOCK_SERVICES_URL=http://mockservices:8082
      - LOCATION_SERVICE_URL=http://location-service:8095
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

  probability-service:
    build:
      context: ./agents/probability-service
      dockerfile: Dockerfile
    ports:
      - "8097:8097"
    depends_on:
      - news-agent
      - ship-mobility-service
    environment:
      - NEWS_AGENT_URL=http://news-agent:8090
      - SHIP_MOBILITY_URL=http://ship-mobility-service:8096

  mockservices:
    build:
      context: ./mockServices
      dockerfile: Dockerfile
    # Internal only - no ports exposed

  enterpriseservice:
    build:
      context: ./enterpriseservice
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    depends_on:
      - mockservices
    environment:
      - MOCK_SERVICES_BASE_URL=http://mockservices:8082
