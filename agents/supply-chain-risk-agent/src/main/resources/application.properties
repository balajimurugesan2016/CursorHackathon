spring.application.name=supply-chain-risk-agent

server.port=8094

# Enterprise master data (plants + suppliers)
supplychain-risk.enterprise-base-url=http://localhost:8081

# Reasoning pipeline report (news + locations + vessels + category risks)
supplychain-risk.reasoning-base-url=http://localhost:8093

# How close (km) a resolved news location must be to a plant/supplier coordinate to count as exposure
supplychain-risk.proximity-radius-km=500

# HTTP timeouts (ms)
supplychain-risk.http-timeout-ms=120000
