spring.application.name=reasoning-agent

server.port=8093

# Upstream agents (run mockServices + news, locations, vessel agents)
reasoning.upstream.news-agent-base-url=http://localhost:8090
reasoning.upstream.locations-agent-base-url=http://localhost:8091
reasoning.upstream.vessel-agent-base-url=http://localhost:8092

# Place catalog for mention detection (mock service)
reasoning.upstream.places-catalog-url=http://localhost:8082/api/v1/places

# Vessel search radius in nautical miles (default when ?radiusNm is omitted; ~54 NM ≈ 100 km)
reasoning.pipeline.search-radius-nm=54
reasoning.pipeline.min-radius-nm=1
reasoning.pipeline.max-radius-nm=270
