# SAP Multi-Target Application (MTA) descriptor — CursorHackathon supply-chain demo stack.
# Build: install https://github.com/SAP/cloud-mta-build-tool then run: mbt build
# Output: mta_archives/cursorhackathon_<version>.mtar
#
# After deploy, set each module’s env URLs to the real routes (or use an approuter + destinations).

_schema-version: 3.3.0
ID: cursorhackathon
version: 1.0.0
description: "Mock APIs, enterprise master data, Spring Boot agents, frontend (React)"

parameters:
  enable-parallel-deployments: true

modules:
  # --- Shared mock HTTP APIs (places, articles, vessels) — port 8082 locally
  - name: mock-service
    type: java
    path: mockServices
    build-parameters:
      builder: maven
      build-result: target/*.jar
    parameters:
      memory: 512M
      disk-quota: 512M

  # --- Plants / suppliers / shipments — port 8085 locally
  - name: enterprise-service
    type: java
    path: enterpriseservice
    build-parameters:
      builder: maven
      build-result: target/*.jar
    parameters:
      memory: 512M
      disk-quota: 512M

  - name: news-agent
    type: java
    path: agents/news-agent
    build-parameters:
      builder: maven
      build-result: target/*.jar
    parameters:
      memory: 512M
      disk-quota: 512M

  - name: locations-agent
    type: java
    path: agents/locations-agent
    build-parameters:
      builder: maven
      build-result: target/*.jar
    parameters:
      memory: 512M
      disk-quota: 512M

  - name: vessel-agent
    type: java
    path: agents/vessel-agent
    build-parameters:
      builder: maven
      build-result: target/*.jar
    parameters:
      memory: 512M
      disk-quota: 512M

  - name: reasoning-agent
    type: java
    path: agents/reasoning-agent
    build-parameters:
      builder: maven
      build-result: target/*.jar
    parameters:
      memory: 768M
      disk-quota: 512M

  - name: supply-chain-risk-agent
    type: java
    path: agents/supply-chain-risk-agent
    build-parameters:
      builder: maven
      build-result: target/*.jar
    parameters:
      memory: 512M
      disk-quota: 512M

  # --- Primary UI (Vite build). Optional dev-only harness: reasoning-ui/ (not an MTA module).
  - name: frontend
    type: html5
    path: frontend
    build-parameters:
      builder: npm
      build-result: dist
    parameters:
      memory: 64M
      disk-quota: 256M
