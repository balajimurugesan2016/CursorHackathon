spring.application.name=EnterpriseService
# 8081 is often taken by other Spring apps; 8085 keeps the hackathon stack predictable alongside mockServices (8082) and agents (8090–8094).
server.port=8085

# H2 — swap for PostgreSQL in production (same JPA model)
spring.datasource.url=jdbc:h2:mem:enterprise;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=always
# true: JSON serialization can initialize lazy associations (needed for entity graphs in list/detail without DTOs)
spring.jpa.open-in-view=true
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mock services (orchestration) — stateless, override per environment
mock.services.base-url=http://localhost:8082
mock.services.timeout-ms=10000

# API — Jackson 3 (Spring Boot 4) has no SerializationFeature.write-dates-as-timestamps; Java time defaults to ISO-8601 strings.
